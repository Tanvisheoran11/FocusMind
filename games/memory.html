<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusMind — Memory Match</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .difficulty-selector { display:flex; gap:10px; flex-wrap:wrap; }
    .diff-btn {
      padding:10px 22px; border-radius:10px; border:2px solid var(--border);
      background:#fff; font-family:'Poppins',sans-serif; font-size:.9rem;
      font-weight:500; cursor:pointer; transition:all .15s; color:var(--text);
    }
    .diff-btn:hover  { border-color:var(--secondary); color:var(--secondary); }
    .diff-btn.active { border-color:var(--secondary); background:var(--secondary); color:#fff; }

    #game-board { justify-content:center; flex-wrap:wrap; display:flex; gap:10px; }

    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center; z-index:200;
    }
    .overlay-card {
      background:#fff; border-radius:20px; padding:40px 36px;
      text-align:center; max-width:380px; width:90%;
      animation:fadeUp .3s ease;
    }
    .overlay-icon { font-size:3.5rem; margin-bottom:12px; }
    .overlay-title { font-size:1.5rem; font-weight:700; color:var(--text); margin-bottom:8px; }
    .overlay-sub   { color:var(--text-muted); font-size:.92rem; margin-bottom:24px; }
    .overlay-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px; }
    .ov-stat       { background:var(--bg); border-radius:10px; padding:10px; }
    .ov-stat-val   { font-size:1.3rem; font-weight:700; color:var(--text); }
    .ov-stat-lbl   { font-size:.75rem; color:var(--text-muted); margin-top:2px; }
  </style>
</head>
<body>

<header class="navbar" id="navbar"></header>

<main class="game-page">

  <!-- Header -->
  <div class="game-header">
    <a href="../pages/games.html" class="btn btn-outline btn-sm">← Back</a>
    <div>
      <h1>🃏 Memory Match</h1>
      <p style="margin:0;font-size:.88rem">Find all matching pairs before time runs out.</p>
    </div>
  </div>

  <!-- Setup panel -->
  <div class="card" id="setup-panel">
    <h2 style="margin-bottom:8px">Choose Difficulty</h2>
    <p style="margin-bottom:18px">
      <span id="rec-note"></span>
    </p>
    <div class="difficulty-selector">
      <button class="diff-btn" id="d-easy"   onclick="setDiff('easy')">Easy&nbsp;&nbsp;<small style="opacity:.7">3×4 grid</small></button>
      <button class="diff-btn active" id="d-normal" onclick="setDiff('normal')">Normal&nbsp;<small style="opacity:.7">4×4 grid</small></button>
      <button class="diff-btn" id="d-hard"   onclick="setDiff('hard')">Hard&nbsp;&nbsp;<small style="opacity:.7">5×4 grid</small></button>
    </div>
    <button class="btn btn-primary btn-lg mt-24" onclick="startGame()" style="width:200px">Start Game</button>
  </div>

  <!-- Game panel -->
  <div class="hidden" id="game-panel">
    <div class="game-stats">
      <div class="stat-pill">⏱ <span id="timer">00:00</span></div>
      <div class="stat-pill">🔀 Moves: <span id="moves">0</span></div>
      <div class="stat-pill">✅ Pairs: <span id="pairs">0</span> / <span id="total-pairs">0</span></div>
      <button class="btn btn-sm btn-outline" onclick="resetToSetup()">Restart</button>
    </div>
    <div id="game-board"></div>
  </div>

</main>

<!-- Result overlay -->
<div class="overlay hidden" id="result-overlay">
  <div class="overlay-card">
    <div class="overlay-icon">🎉</div>
    <div class="overlay-title">Well Done!</div>
    <div class="overlay-sub">You matched all the pairs!</div>
    <div class="overlay-stats">
      <div class="ov-stat"><div class="ov-stat-val" id="res-time">—</div><div class="ov-stat-lbl">Time</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="res-moves">—</div><div class="ov-stat-lbl">Moves</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="res-score">—</div><div class="ov-stat-lbl">Score</div></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-primary" onclick="playAgain()">Play Again</button>
      <a href="../pages/games.html" class="btn btn-outline">All Games</a>
      <a href="../pages/analytics.html" class="btn btn-outline">My Progress</a>
    </div>
  </div>
</div>

<script src="../script.js"></script>
<script>
FM.requireAuth();
FM.renderNav('games');

const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐵','🦄','🐙','🦋','🌸','🍕','⭐'];

const DIFFS = {
  easy:   { cols:3, rows:4, pairs:6,  time:90  },
  normal: { cols:4, rows:4, pairs:8,  time:120 },
  hard:   { cols:5, rows:4, pairs:10, time:150 }
};

let diff = 'normal', timerInterval, elapsed = 0, moves = 0, matched = 0;
let flipped = [], board = [], locked = false;

// Pre-select difficulty based on stress level
const user = FM.getCurrentUser();
const level = user.stressLevel;
if (level === 'high')     { diff = 'easy';   document.getElementById('d-easy').classList.add('active');   document.getElementById('d-normal').classList.remove('active'); }
else if (level === 'low') { diff = 'hard';   document.getElementById('d-hard').classList.add('active');   document.getElementById('d-normal').classList.remove('active'); }

const noteEl = document.getElementById('rec-note');
if (level) {
  const msgs = { high:'High stress detected — Easy mode is recommended.', moderate:'Moderate stress — Normal mode is a good fit.', low:'Low stress — challenge yourself with Hard mode!' };
  noteEl.textContent = msgs[level];
  noteEl.style.color = level === 'high' ? 'var(--danger)' : level === 'moderate' ? 'var(--warning)' : 'var(--success)';
} else {
  noteEl.textContent = 'Select a difficulty to begin.';
}

function setDiff(d) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('d-' + d).classList.add('active');
}

function startGame() {
  document.getElementById('setup-panel').classList.add('hidden');
  document.getElementById('game-panel').classList.remove('hidden');
  initGame();
}

function initGame() {
  const cfg = DIFFS[diff];
  moves = 0; matched = 0; elapsed = 0; flipped = []; locked = false;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = 0;
  document.getElementById('total-pairs').textContent = cfg.pairs;
  document.getElementById('timer').textContent = '00:00';
  clearInterval(timerInterval);

  // Build card array
  const chosen = EMOJIS.slice(0, cfg.pairs);
  board = shuffle([...chosen, ...chosen]);

  // Render grid
  const boardEl = document.getElementById('game-board');
  boardEl.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
  boardEl.style.maxWidth = cfg.cols * 92 + 'px';
  boardEl.innerHTML = board.map((emoji, i) => `
    <div class="memory-card" id="card-${i}" onclick="flipCard(${i})">
      <div class="memory-card-inner">
        <div class="memory-card-front">?</div>
        <div class="memory-card-back">${emoji}</div>
      </div>
    </div>`).join('');

  // Start timer
  timerInterval = setInterval(() => {
    elapsed++;
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
    if (elapsed >= DIFFS[diff].time) {
      clearInterval(timerInterval);
      endGame(false);
    }
  }, 1000);
}

function flipCard(idx) {
  if (locked) return;
  const card = document.getElementById('card-' + idx);
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(idx);
  if (flipped.length === 2) checkMatch();
}

function checkMatch() {
  locked = true;
  moves++;
  document.getElementById('moves').textContent = moves;
  const [a, b] = flipped;
  if (board[a] === board[b]) {
    document.getElementById('card-'+a).classList.add('matched');
    document.getElementById('card-'+b).classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent = matched;
    flipped = []; locked = false;
    if (matched === DIFFS[diff].pairs) {
      clearInterval(timerInterval);
      setTimeout(() => endGame(true), 400);
    }
  } else {
    setTimeout(() => {
      document.getElementById('card-'+a).classList.remove('flipped');
      document.getElementById('card-'+b).classList.remove('flipped');
      flipped = []; locked = false;
    }, 900);
  }
}

function endGame(won) {
  const cfg   = DIFFS[diff];
  const score = won ? Math.max(0, Math.round((cfg.time - elapsed) * 5 + (cfg.pairs * 20) - moves * 3)) : 0;
  const m     = String(Math.floor(elapsed/60)).padStart(2,'0');
  const s     = String(elapsed%60).padStart(2,'0');

  if (won) {
    document.querySelector('.overlay-icon').textContent  = '🎉';
    document.querySelector('.overlay-title').textContent = 'You Won!';
    document.querySelector('.overlay-sub').textContent   = 'All pairs matched!';
  } else {
    document.querySelector('.overlay-icon').textContent  = '⏰';
    document.querySelector('.overlay-title').textContent = 'Time\'s Up!';
    document.querySelector('.overlay-sub').textContent   = `You found ${matched} of ${cfg.pairs} pairs.`;
  }
  document.getElementById('res-time').textContent  = `${m}:${s}`;
  document.getElementById('res-moves').textContent = moves;
  document.getElementById('res-score').textContent = score;
  document.getElementById('result-overlay').classList.remove('hidden');

  FM.saveScore('Memory Match', score, `${diff} • ${matched}/${cfg.pairs} pairs • ${moves} moves`);
  FM.toast('Score saved!', `${score} points`, 'success');
}

function playAgain() {
  document.getElementById('result-overlay').classList.add('hidden');
  initGame();
}

function resetToSetup() {
  clearInterval(timerInterval);
  document.getElementById('game-panel').classList.add('hidden');
  document.getElementById('setup-panel').classList.remove('hidden');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
</body>
</html>
